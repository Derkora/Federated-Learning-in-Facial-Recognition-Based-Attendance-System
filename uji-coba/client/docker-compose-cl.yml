services:
  client-cl:
    build:
      context: ../../centralized-learning
      dockerfile: client/Dockerfile
    container_name: client_cl_balanced
    ports:
      - "8081:8080"
    environment:
      - CL_SERVER_ADDRESS=http://${SERVER_IP}:8081
      - PYTHONUNBUFFERED=1
      - HOSTNAME=${CLIENT_ID:-terminal-1}
      - CAMERA_INDEX=0
      - CAMERA_FORMAT=MJPG
      - CAMERA_WIDTH=1280
      - CAMERA_HEIGHT=720
    devices:
      - /dev/video0:/dev/video0
    group_add:
      - video
    volumes:
      - ./data:/app/data
      - ${RAW_DATA_PATH_CLIENT}:/app/raw_data/students
    networks:
      - cl-network

networks:
  cl-network:
    driver: bridge
