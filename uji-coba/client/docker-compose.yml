services:
  client-fl:
    build:
      context: ../../federated-learning
      dockerfile: client/Dockerfile
    container_name: client_fl_balanced
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=sqlite:////app/data/client.db
      - SERVER_API_URL=http://${SERVER_IP}:8080
      - FL_SERVER_ADDRESS=${SERVER_IP}:8085
      - PYTHONUNBUFFERED=1
      - HOSTNAME=${CLIENT_ID:-terminal-1}
      - CAMERA_INDEX=0
      - CAMERA_FORMAT=MJPG
      - CAMERA_WIDTH=1280
      - CAMERA_HEIGHT=720
    devices:
      - /dev/video0:/dev/video0
    group_add:
      - video
    volumes:
      - ./data:/app/data
      - ${RAW_DATA_PATH_CLIENT}:/app/raw_data/students
    networks:
      - fl-network

networks:
  fl-network:
    driver: bridge
