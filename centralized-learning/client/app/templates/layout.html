<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Terminal | Attendance</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; text-align: left;">
            <div>
                <h1 style="margin: 0; font-size: 2rem; background: linear-gradient(135deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Edge Terminal</h1>
                <div class="terminal-badge" style="margin: 0.3rem 0 0 0; padding: 0.2rem 0.8rem;">ID: {{ client_id }}</div>
            </div>
            <nav style="display: flex; gap: 0.8rem;">
                <a href="/" id="nav-live" style="text-decoration: none; padding: 10px 18px; border-radius: 10px; color: var(--text-main); font-weight: 600; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.05); transition: all 0.2s; font-size: 0.9rem;" class="nav-btn">Live Camera</a>
                <a href="/test-video" id="nav-video" style="text-decoration: none; padding: 10px 18px; border-radius: 10px; color: var(--text-muted); font-weight: 600; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); transition: all 0.2s; font-size: 0.9rem;" class="nav-btn">Test Video File</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>

</html>
