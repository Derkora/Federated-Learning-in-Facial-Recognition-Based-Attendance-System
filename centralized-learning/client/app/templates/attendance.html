{% extends "layout.html" %}

{% block content %}
<div class="glass" style="padding: 1.5rem; margin-bottom: 1.5rem;">
    <div
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.8rem;">
        <h2 style="margin: 0; font-size: 1.4rem;">Edge Client: {{ client_id }}</h2>
        <span class="badge" id="model-badge">Model v{{ model_version }}</span>
    </div>
    <div
        style="position: relative; overflow: hidden; border-radius: 12px; background: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <img id="video-stream" src="/video_feed" style="width: 100%; height: auto; display: block;">
        <div
            style="position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);">
            🔴 <span style="font-weight: 700;">LIVE</span> <span id="virtual-indicator"
                style="display:none; color:#f87171; margin-left:5px;">| KAMERA VIRTUAL</span>
        </div>
    </div>
</div>

<div class="result-card glass" id="status-card">
    Menghubungkan ke pusat...
</div>

<button id="btn-browser-cam" class="btn"
    style="width: 100%; height: 60px; margin-top: 1rem; background: rgba(255,255,255,0.03); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.08); font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
    📷 Aktifkan Kamera Lokal
</button>
</div>

<style>
    .badge {
        background: var(--accent);
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
    }
</style>

<script>
    const statusCard = document.getElementById('status-card');
    const bVideo = document.createElement('video');
    const bCanvas = document.createElement('canvas');
    let bStream = null;
    let bBusy = false;

    document.getElementById('btn-browser-cam').onclick = () => {
        if (!bStream) startBrowserCam();
        else alert("Kamera browser sudah aktif.");
    };

    async function pollResults() {
        try {
            const res = await fetch('/api/results/latest');
            const data = await res.json();

            if (data.model_version !== undefined) {
                document.getElementById('model-badge').innerText = `Model v${data.model_version}`;
            }

            if (data.is_virtual) {
                document.getElementById('virtual-indicator').style.display = 'inline';
                if (!bStream && !bBusy) startBrowserCam();
            } else {
                document.getElementById('virtual-indicator').style.display = 'none';
            }

            if (data.matched && data.matched !== "Standby") {
                if (data.matched !== "Unknown") {
                    statusCard.innerHTML = `<span style="color: #10b981;">Diterima: ${data.matched}</span> <br><small>${(data.confidence * 100).toFixed(1)}% | ${data.latency_ms}ms</small>`;
                } else {
                    statusCard.innerText = "Memindai wajah...";
                    statusCard.style.color = "#f8fafc";
                }
            } else {
                statusCard.innerText = "Kamera: Menunggu Model...";
            }
        } catch (e) {
            console.error("Poll Error:", e);
        }
    }

    async function startBrowserCam() {
        try {
            bBusy = true;
            bStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            bVideo.srcObject = bStream;
            bVideo.play();
            console.log("[BROWSER CAM] Started.");

            setInterval(async () => {
                if (bStream) {
                    bCanvas.width = 640; bCanvas.height = 480;
                    bCanvas.getContext('2d').drawImage(bVideo, 0, 0, 640, 480);
                    const b64 = bCanvas.toDataURL('image/jpeg', 0.4).split(',')[1];
                    try {
                        await fetch('/api/inference', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: b64 })
                        });
                    } catch (e) { }
                }
            }, 1000);
        } catch (e) {
            console.warn("[BROWSER CAM] Failed:", e);
            bBusy = false;
        }
    }

    setInterval(pollResults, 1000);
</script>
{% endblock %}
