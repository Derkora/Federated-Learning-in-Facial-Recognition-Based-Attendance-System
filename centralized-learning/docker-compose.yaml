services:
  server-cl:
    build: ./server
    container_name: centralized_server
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgresql://admin:admin123@server-cl-db:5432/cl_server
      PYTHONUNBUFFERED: 1
    depends_on:
      server-cl-db:
        condition: service_healthy
    networks:
      - clnet

  client1-cl:
    build: ./client
    container_name: centralized_client1
    environment:
      DATABASE_URL: postgresql://client:client123@client1-cl-db:5432/cl_client
      CL_SERVER_ADDRESS: http://server-cl:8080
      PYTHONUNBUFFERED: 1
    depends_on:
      client1-cl-db:
        condition: service_healthy
    ports:
      - "8082:8080"
    volumes:
      - ../datasets/client1_data:/app/data
    networks:
      - clnet

  client2-cl:
    build: ./client
    container_name: centralized_client2
    environment:
      DATABASE_URL: postgresql://client:client123@client2-cl-db:5432/cl_client
      CL_SERVER_ADDRESS: http://server-cl:8080
      PYTHONUNBUFFERED: 1
    depends_on:
      client2-cl-db:
        condition: service_healthy
    ports:
      - "8083:8080"
    volumes:
      - ../datasets/client2_data:/app/data
    networks:
      - clnet

  server-cl-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=cl_server
    ports:
      - "5432:5432"
    volumes:
      - server_cl_data:/var/lib/postgresql/data
    networks:
      - clnet
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d cl_server" ]
      interval: 5s
      timeout: 5s
      retries: 5

  client1-cl-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=client
      - POSTGRES_PASSWORD=client123
      - POSTGRES_DB=cl_client
    volumes:
      - client1_cl_data:/var/lib/postgresql/data
    networks:
      - clnet
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U client -d cl_client" ]
      interval: 5s
      timeout: 5s
      retries: 5

  client2-cl-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=client
      - POSTGRES_PASSWORD=client123
      - POSTGRES_DB=cl_client
    volumes:
      - client2_cl_data:/var/lib/postgresql/data
    networks:
      - clnet
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U client -d cl_client" ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  clnet:
    driver: bridge

volumes:
  server_cl_data:
  client1_cl_data:
  client2_cl_data:
