services:
  client-cl:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client_cl_balanced
    ports:
      - "8081:8080"
    environment:
      - CL_SERVER_ADDRESS=http://${SERVER_IP:-127.0.0.1}:8081
      - PYTHONUNBUFFERED=1
      - HOSTNAME=${CLIENT_ID:-terminal-1}
      - CAMERA_INDEX=0
      - CAMERA_FORMAT=MJPG
      - CAMERA_WIDTH=1280
      - CAMERA_HEIGHT=720
    devices:
      - /dev/video0:/dev/video0
    group_add:
      - video
    volumes:
      - ./client/data:/app/data
      - ${RAW_DATA_PATH_CLIENT:-./client/raw_data/students}:/app/raw_data/students
    networks:
      - cl-network

networks:
  cl-network:
    driver: bridge
