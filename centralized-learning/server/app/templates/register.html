<!DOCTYPE html>
<html>
<head>
    <title>Registrasi Wajah</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background: #218838; }
        .back-link { display: block; margin-top: 20px; color: #007bff; text-decoration: none; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ddd; display: none; }
    </style>
</head>
<body>
    <h1>Registrasi User Baru</h1>
    <p>Masukkan nama dan upload minimal 5 foto wajah yang jelas.</p>
    
    <form id="regForm">
        <div class="form-group">
            <label>Nama Lengkap:</label>
            <input type="text" id="name" name="name" required placeholder="Contoh: Budi Santoso">
        </div>
        
        <div class="form-group">
            <label>Foto Wajah (Pilih Banyak):</label>
            <input type="file" id="files" name="files" multiple accept="image/*" required>
        </div>
        
        <button type="submit" id="btnSubmit">Daftar & Latih Model</button>
    </form>

    <div id="result"></div>
    <a href="/" class="back-link">← Kembali ke Home</a>

    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const resultDiv = document.getElementById('result');
            
            btn.disabled = true;
            btn.innerText = "Sedang Memproses...";
            resultDiv.style.display = "none";

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            
            const fileInput = document.getElementById('files');
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('files', fileInput.files[i]);
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                resultDiv.style.display = "block";
                if(data.status === 'success') {
                    resultDiv.style.color = "green";
                    resultDiv.innerHTML = `<strong>Sukses!</strong> ${data.message}<br>Loss Training: ${data.train_info.loss || 'N/A'}`;
                } else {
                    resultDiv.style.color = "red";
                    resultDiv.innerText = "Error: " + data.message;
                }
            } catch (err) {
                resultDiv.style.display = "block";
                resultDiv.style.color = "red";
                resultDiv.innerText = "Gagal koneksi ke server.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Daftar & Latih Model";
            }
        };
    </script>
</body>
</html>
