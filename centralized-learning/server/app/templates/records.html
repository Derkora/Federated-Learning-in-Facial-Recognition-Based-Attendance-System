{% extends "layout.html" %}

{% block content %}
<div class="glass" style="padding: 1.5rem;">
    <h2>Today's Attendance Board</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Real-time monitoring of today's student
        check-ins.</p>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid var(--accent-low);">
                    <th style="padding: 12px;">NRP</th>
                    <th style="padding: 12px;">Name</th>
                    <th style="padding: 12px;">Status</th>
                    <th style="padding: 12px;">Last Seen (Today)</th>
                    <th style="padding: 12px;">Confidence</th>
                </tr>
            </thead>
            <tbody id="attendance-body">
                <tr>
                    <td colspan="5" style="padding: 40px; text-align: center; color: var(--text-muted);">
                        Loading real-time attendance data...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<style>
    #attendance-body tr {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: background 0.3s;
    }

    #attendance-body tr:hover {
        background: rgba(255, 255, 255, 0.02);
    }

    #attendance-body td {
        padding: 12px;
    }

    .status-badge {
        padding: 4px 10px;
        border-radius: 4px;
        font-weight: bold;
        font-size: 0.8rem;
    }

    .status-attended {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
    }

    .status-pending {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-muted);
    }
</style>

<script>
    async function updateAttendance() {
        try {
            const res = await fetch('/api/attendance');
            const data = await res.json();
            const body = document.getElementById('attendance-body');

            if (data.length > 0) {
                body.innerHTML = data.map(a => {
                    const isAttended = a.status.includes('✅');
                    return `
                        <tr>
                            <td>${a.nrp}</td>
                            <td><b>${a.name}</b></td>
                            <td>
                                <span class="status-badge ${isAttended ? 'status-attended' : 'status-pending'}">
                                    ${isAttended ? '✅ ATTENDED' : 'WAITING'}
                                </span>
                            </td>
                            <td>${a.time}</td>
                            <td>${a.confidence}</td>
                        </tr>
                    `;
                }).join('');
            } else {
                body.innerHTML = '<tr><td colspan="5" style="padding: 40px; text-align: center; color: var(--text-muted);">No students registered. Run "Import Data" on the dashboard first.</td></tr>';
            }
        } catch (e) {
            console.error("Attendance Update Error:", e);
        }
    }

    // Initial load and 2s polling
    updateAttendance();
    setInterval(updateAttendance, 2000);
</script>
{% endblock %}
