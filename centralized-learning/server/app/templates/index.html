<!DOCTYPE html>
<html>
<head>
    <title>Centralized Face Rec</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; text-align: center; }
        .btn { padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; margin: 5px; display: inline-block;}
    </style>
</head>
<body>
    <h1>Sistem Pengenalan Wajah Terpusat</h1>
    <p>Menggunakan Pretrained InceptionResnetV1 (VGGFACE2)</p>
    
    <div style="margin: 20px 0;">
        <a href="/register" class="btn">1. Registrasi Wajah</a>
        <a href="/recognize" class="btn">3. Test Pengenalan</a>
    </div>

    <div style="border: 1px solid #ccc; padding: 20px; border-radius: 8px;">
        <h3>2. Training Model</h3>
        <p>Klik tombol ini setelah mendaftarkan user baru.</p>
        <button onclick="trainModel()" style="padding: 10px; cursor: pointer;">Latih Model Sekarang</button>
        <p id="train-status" style="color: green;"></p>
    </div>

    <script>
        async function trainModel() {
            document.getElementById("train-status").innerText = "Sedang melatih...";
            const response = await fetch("/api/train", {method: "POST"});
            const data = await response.json();
            document.getElementById("train-status").innerText = data.message;
        }
    </script>
</body>
</html>
