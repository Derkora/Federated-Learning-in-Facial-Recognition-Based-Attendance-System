{% extends "layout.html" %}

{% block content %}
<div class="glass" style="padding: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <div>
            <h1 style="color: var(--accent); margin-bottom: 0.5rem;">Centralized Learning Server</h1>
            <p id="status-phase" style="color: var(--text-muted); font-weight: 500;">Status: Standby</p>
        </div>
        <button id="btn-lifecycle" class="btn btn-primary" onclick="runLifecycle()"
            style="padding: 1rem 2rem; font-size: 1.1rem;">
            🚀 MULAI PELATIHAN TERPUSAT
        </button>
    </div>

    <div id="training-terminal"
        style="height: 500px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 0.9rem; border: 1px solid var(--accent-low); line-height: 1.6; color: #d1d5db;">
        [READY] Centralized Research Environment Initialized.<br>
        [INFO] Menunggu sinyal mulai untuk memproses data dari terminal...
    </div>
</div>

<style>
    .metric-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.8rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .metric-row span {
        color: var(--text-muted);
    }

    .student-item {
        padding: 5px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 0.9rem;
    }
</style>

<script>
    let pollInterval = null;

    async function runLifecycle() {
        if (!confirm("Start full training cycle (Import -> Preprocess -> Train -> Export)?")) return;

        const btn = document.getElementById('btn-lifecycle');
        btn.disabled = true;

        startPolling();

        try {
            const response = await fetch(`/workflow/full-lifecycle`, { method: 'POST' });
            const result = await response.json();

            if (result.status === 'success') {
                updateUIState(); // Final full update
            }
        } catch (e) {
            console.error("Lifecycle Error:", e);
        } finally {
            btn.disabled = false;
        }
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(updateUIState, 2000);
    }

    function stopPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = null;
    }

    async function updateUIState() {
        try {
            // 1. Fetch Status
            const resStatus = await fetch('/api/status');
            const status = await resStatus.json();

            // Update Logs & Phase
            const terminal = document.getElementById('training-terminal');
            terminal.innerHTML = status.current_logs.join('<br>');
            terminal.scrollTop = terminal.scrollHeight;
            document.getElementById('status-phase').innerText = "Status: " + (status.is_busy ? "Sedang Berjalan (" + status.current_phase + ")" : "Standby");

            // Persistence of polling if busy
            if (status.is_busy && !pollInterval) startPolling();
            if (!status.is_busy && pollInterval && !document.getElementById('btn-lifecycle').disabled) stopPolling();

        } catch (e) { console.error("Poll error:", e); }
    }

    // Initial load
    updateUIState();
</script>
{% endblock %}
