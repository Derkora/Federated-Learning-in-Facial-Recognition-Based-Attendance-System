{% extends "layout.html" %}

{% block content %}
<div class="glass" style="padding: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <div>
            <h1 style="color: var(--accent); margin-bottom: 0.5rem;">Federated Learning Server</h1>
            <p id="phase-display" style="color: var(--text-muted); font-weight: 500; text-transform: capitalize;">
                Status: Standby</p>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div
                style="background: rgba(0,0,0,0.2); padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
                <label style="font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 4px;">JUMLAH
                    RONDE</label>
                <input type="number" id="rounds" value="{{ status.default_rounds }}" min="1"
                    style="width: 60px; background: transparent; border: none; color: white; font-size: 1.1rem; font-weight: bold; outline: none;">
            </div>
            <button id="start-btn" class="btn btn-primary" onclick="startTraining()"
                style="padding: 1rem 2rem; font-size: 1.1rem;" {{ 'disabled' if status.is_running }}>
                {{ "SEDANG BERJALAN..." if status.is_running else "🚀 MULAI TRAINING FEDERATED" }}
            </button>
        </div>
    </div>

    <div id="training-terminal"
        style="height: 500px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 25px; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 0.9rem; border: 1px solid var(--accent-low); line-height: 1.6; color: #e5e7eb; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);">
        [READY] Federated coordinator initialized.<br>
        [WAITING] Menunggu terminal client terhubung untuk memulai sinyal agregasi...
    </div>
</div>

<style>
    .metric-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.8rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 0.9rem;
    }

    .metric-row span {
        color: var(--text-muted);
    }
</style>

<script>
    let lossChart;
    let pollInterval = null;

    async function startTraining() {
        const rounds = document.getElementById('rounds').value;
        const res = await fetch(`/api/fl/start?rounds=${rounds}&min_clients={{ status.default_min_clients }}`, { method: 'POST' });
        const data = await res.json();
        if (data.status === 'started') {
            alert("🚀 Full Lifecycle Started: Sync -> Preprocess -> Train");
            startPolling();
        } else if (data.status === 'already_running') {
            alert("⚠️ Training is already in progress.");
        }
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(updateUIState, 2000);
    }

    function stopPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = null;
    }

    async function updateUIState() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();

            // 1. Update Phase & Running Status
            const phaseEl = document.getElementById('phase-display');
            const phaseText = data.phase || 'Standby';
            phaseEl.innerText = "Status: " + (data.is_running ? "Sedang Berjalan (" + phaseText + ")" : "Standby");
            phaseEl.style.color = (data.is_busy) ? 'var(--accent)' : 'var(--text-muted)';

            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = data.is_running;
            startBtn.innerText = data.is_running ? "SEDANG BERJALAN..." : "🚀 MULAI TRAINING FEDERATED";

            // 2. Update Logs (Terminal)
            const terminal = document.getElementById('training-terminal');
            if (data.phase_logs && data.phase_logs.length > 0) {
                terminal.innerHTML = data.phase_logs.join('<br>');
                terminal.scrollTop = terminal.scrollHeight;
            }

            // 5. Polling Management
            if (data.is_busy && !pollInterval) startPolling();
            if (!data.is_busy && pollInterval) stopPolling();

        } catch (e) { console.error("Poll error:", e); }
    }

    initChart();
    updateUIState();
    // Initial poll for live updates
    startPolling();
</script>
{% endblock %}
