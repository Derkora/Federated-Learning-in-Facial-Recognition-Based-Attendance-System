services:
  server-fl:
    build: ./server
    container_name: federated_server
    ports:
      - "8081:8080"
      - "8085:8085"
    environment:
      DATABASE_URL: postgresql://admin:admin123@server-fl-db:5432/fl_server
    depends_on:
      server-fl-db:
        condition: service_healthy
    networks:
      - flnet

  client1-fl:
    build: ./client
    container_name: federated_client1
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgresql://client:client123@client1-fl-db:5432/fl_client
      SERVER_API_URL: http://server-fl:8080
      FL_SERVER_ADDRESS: server-fl:8085
    depends_on:
      client1-fl-db:
        condition: service_healthy
    volumes:
      - ../datasets/client1_data:/app/data
    networks:
      - flnet

  client2-fl:
    build: ./client
    container_name: federated_client2
    ports:
      - "8083:8080"
    environment:
      DATABASE_URL: postgresql://client:client123@client2-fl-db:5432/fl_client
      SERVER_API_URL: http://server-fl:8080
      FL_SERVER_ADDRESS: server-fl:8085
    depends_on:
      client2-fl-db:
        condition: service_healthy
    volumes:
      - ../datasets/client2_data:/app/data
    networks:
      - flnet

  server-fl-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=fl_server
    ports:
      - "5432:5432"
    volumes:
      - server_fl_data:/var/lib/postgresql/data
    networks:
      - flnet
    healthcheck:  
      test: ["CMD-SHELL", "pg_isready -U admin -d fl_server"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  client1-fl-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=client
      - POSTGRES_PASSWORD=client123
      - POSTGRES_DB=fl_client
    volumes:
      - client1_fl_data:/var/lib/postgresql/data
    networks:
      - flnet
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U client -d fl_client"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  client2-fl-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=client
      - POSTGRES_PASSWORD=client123
      - POSTGRES_DB=fl_client
    volumes:
      - client2_fl_data:/var/lib/postgresql/data
    networks:
      - flnet
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U client -d fl_client"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  flnet:
    driver: bridge

volumes:
  server_fl_data:
  client1_fl_data:
  client2_fl_data:
