services:
  client1-fl:
    build: ./client
    container_name: federated_client1
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgresql://client:client123@client1-fl-db:5432/fl_client
      SERVER_API_URL: http://${SERVER_IP}:8081
      FL_SERVER_ADDRESS: ${SERVER_IP}:8085
      PYTHONUNBUFFERED: 1
      HOSTNAME: terminal-1
    depends_on:
      client1-fl-db:
        condition: service_healthy
    volumes:
      - ./${RAW_DATA_PATH_CLIENT1}:/app/raw_data

  client1-fl-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=client
      - POSTGRES_PASSWORD=client123
      - POSTGRES_DB=fl_client
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U client -d fl_client" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - client1_fl_data:/var/lib/postgresql/data

volumes:
  client1_fl_data:
