services:
  server:
    build: ../server
    ports:
      - "8080:8080" # Maps Host 8080 to Container 8080
      - "8085:8085" # Maps Host 8085 to Container 8085 (Flower)
    environment:
      - DATABASE_URL=postgresql://admin:admin123@server-db:5432/fl_server
    depends_on:
      server-db:
        condition: service_healthy
    networks:
      - flnet
    restart: always

  server-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=fl_server
    volumes:
      - server_data:/var/lib/postgresql/data
    networks:
      - flnet
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d fl_server" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

networks:
  flnet:
    driver: bridge

volumes:
  server_data:
