{% extends "layout.html" %}

{% block content %}
<div class="glass" style="padding: 1.5rem; margin-bottom: 1.5rem;">
    <div
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.8rem;">
        <h2 style="margin: 0; font-size: 1.4rem;">Edge Client: {{ client_id }}</h2>
        <span class="badge" id="model-badge">Model v{{ model_version }}</span>
    </div>
    <div
        style="position: relative; overflow: hidden; border-radius: 12px; background: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <img id="video-stream" src="/video_feed" style="width: 100%; height: auto; display: block;">
        <div
            style="position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);">
            🔴 <span style="font-weight: 700;">LIVE</span> <span id="virtual-indicator"
                style="display:none; color:#f87171; margin-left:5px;">| KAMERA VIRTUAL</span>
        </div>
    </div>
</div>

<div class="result-card glass" id="status-card">
    Memindai wajah...
</div>

<button id="btn-toggle-hw" class="btn"
    style="width: 100%; height: 60px; margin-top: 1rem; background: var(--accent); color: white; font-weight: bold; font-size: 1.1rem; border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
    🎥 Aktifkan Kamera Edge
</button>
</div>

<style>
    .badge {
        background: var(--accent);
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
    }
</style>

<script>
    const statusCard = document.getElementById('status-card');
    const toggleBtn = document.getElementById('btn-toggle-hw');
    let camActive = false;

    toggleBtn.onclick = async () => {
        try {
            const res = await fetch('/api/camera/toggle', { method: 'POST' });
            const data = await res.json();
            camActive = data.is_on;
            updateButtonState();
        } catch (e) {
            alert("Gagal mengontrol kamera: " + e);
        }
    };

    function updateButtonState() {
        if (camActive) {
            toggleBtn.innerHTML = "🛑 Matikan Kamera Edge";
            toggleBtn.style.background = "#ef4444";
        } else {
            toggleBtn.innerHTML = "🎥 Aktifkan Kamera Edge";
            toggleBtn.style.background = "var(--accent)";
        }
    }

    async function pollResults() {
        try {
            const res = await fetch('/api/results/latest');
            const data = await res.json();

            if (data.model_version !== undefined) {
                document.getElementById('model-badge').innerText = `Model v${data.model_version}`;
            }

            // Sync tombol dengan status internal jika diperlukan
            if (data.matched === "CAMERA OFF" && camActive) {
                camActive = false;
                updateButtonState();
            } else if (data.matched !== "CAMERA OFF" && data.matched !== "TRAINING PHASE..." && data.matched !== "TRAINING..." && data.matched !== "CAMERA DISABLED" && !camActive) {
                camActive = true;
                updateButtonState();
            }

            if (data.matched && data.matched !== "Standby") {
                if (data.matched === "CAMERA OFF") {
                    statusCard.innerHTML = `<span style="color: #94a3b8;">Kamera: PADAM</span>`;
                } else if (data.matched === "TRAINING PHASE..." || data.matched === "TRAINING...") {
                    statusCard.innerHTML = `<span style="color: var(--accent);">Status: TRAINING...</span>`;
                } else if (data.matched !== "Unknown") {
                    statusCard.innerHTML = `<span style="color: #10b981;">Diterima: ${data.matched}</span> <br><small>${(data.confidence * 100).toFixed(1)}% | ${data.latency_ms}ms</small>`;
                } else {
                    statusCard.innerText = "Memindai wajah...";
                    statusCard.style.color = "#f8fafc";
                }
            } else {
                statusCard.innerText = "Kamera: Menunggu Instruksi...";
            }
        } catch (e) {
            console.error("Poll Error:", e);
        }
    }

    setInterval(pollResults, 1000);
</script>
{% endblock %}
