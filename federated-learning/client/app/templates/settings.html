{% extends "layout.html" %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <h1 style="text-align: center; margin-bottom: 30px;">Pengaturan Koneksi</h1>
    
    <div class="card" style="padding: 30px;">
        <form action="/settings" method="post">
            <div style="margin-bottom: 20px;">
                <label for="server_api_url" style="display: block; margin-bottom: 8px; font-weight: bold;">Server API URL</label>
                <input type="text" id="server_api_url" name="server_api_url" value="{{ server_api_url }}" 
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" required
                       placeholder="http://ip-server:8080">
                <small style="color: #666;">URL untuk API REST Server (misal: http://192.168.1.10:8080)</small>
            </div>

            <div style="margin-bottom: 30px;">
                <label for="fl_server_address" style="display: block; margin-bottom: 8px; font-weight: bold;">Flower Server Address</label>
                <input type="text" id="fl_server_address" name="fl_server_address" value="{{ fl_server_address }}" 
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" required
                       placeholder="ip-server:8085">
                <small style="color: #666;">Alamat untuk koneksi Federated Learning (misal: 192.168.1.10:8085)</small>
            </div>

            <div style="text-align: right;">
                <a href="/" style="margin-right: 15px; text-decoration: none; color: #666;">Batal</a>
                <button type="submit" class="btn" style="background-color: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">Simpan Pengaturan</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
